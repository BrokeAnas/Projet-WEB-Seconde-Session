<mat-toolbar color="primary" class="navbar">
  <a routerLink="/patients" class="brand">
    <mat-icon>local_hospital</mat-icon>
    <span class="brand-name">MediCare Manager</span>
  </a>

  <nav class="nav-links">
    <a mat-button routerLink="/patients" routerLinkActive="active-link">Patients</a>
    <a mat-button routerLink="/agenda" routerLinkActive="active-link">Agenda</a>
  </nav>

  <span class="spacer"></span>

  <div class="user-zone">
    <div class="user-info">
      <span class="user-name">{{ authStateService.nom() }}</span>
    </div>
    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Menu utilisateur">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Déconnexion</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
